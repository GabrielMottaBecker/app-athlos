name: athlos
description: Athlos - Plataforma de Gestão de Atlética (MVVM)

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  provider: ^6.1.2
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0  # armazena tokens com segurança
  jwt_decoder: ^2.0.1             # decodifica e verifica expiração
  dio: ^5.4.0                     # opcional, mas facilita interceptors

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
