name: athlos
description: Athlos - Plataforma de Gestão de Atlética (MVVM)

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # Firebase core — obrigatório para qualquer pacote Firebase
  firebase_core: ^3.6.0
 
  # Firebase Cloud Messaging — notificações push
  firebase_messaging: ^15.1.3
 
  # Exibição de notificações locais (foreground)
  flutter_local_notifications: ^18.0.0
 
  # HTTP — para enviar mensagens à API do FCM
  http: ^1.2.2

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  provider: ^6.1.2
  url_launcher: ^6.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
